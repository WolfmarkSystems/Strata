<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0c0f16"/>

  <!-- Wolf head scaled from 28x28 to ~410x410, centered at 256,256 -->
  <!-- Scale: 14.6x, offset: 256 - 14*14.6 = 51.6 -->
  <g transform="translate(51.6, 51.6) scale(14.6)">
    <!-- Left ear outer -->
    <polygon points="4,14 7,3 11,11" fill="#b8c8d8" opacity="0.9"/>
    <!-- Left ear inner -->
    <polygon points="5,13 7,5 10,11" fill="#0c0f16"/>
    <!-- Right ear outer -->
    <polygon points="24,14 21,3 17,11" fill="#b8c8d8" opacity="0.9"/>
    <!-- Right ear inner -->
    <polygon points="23,13 21,5 18,11" fill="#0c0f16"/>

    <!-- Main head octagon -->
    <polygon points="14,2 22,8 24,15 20,22 14,26 8,22 4,15 6,8"
             fill="#111e2e" stroke="#8fa8c0" stroke-width="0.8"/>

    <!-- Forehead center plate -->
    <polygon points="14,4 18,8 14,11 10,8"
             fill="#1a2e44" stroke="#8fa8c0" stroke-width="0.4"/>

    <!-- Left face plate -->
    <polygon points="6,8 10,8 9,15 5,14" fill="#162030" opacity="0.8"/>
    <!-- Right face plate -->
    <polygon points="22,8 18,8 19,15 23,14" fill="#162030" opacity="0.8"/>

    <!-- Left eye socket -->
    <polygon points="8,11 10,10 12,12 10,14 7,13" fill="#080c10"/>
    <!-- Left eye glow -->
    <polygon points="8,11 10,10 12,12 10,13 8,12" fill="#4a7fc1" opacity="0.5"/>
    <!-- Left eye bright -->
    <polygon points="9,11 10,10 11,12 10,13 8,12" fill="#ffffff" opacity="0.9"/>

    <!-- Right eye socket -->
    <polygon points="20,11 18,10 16,12 18,14 21,13" fill="#080c10"/>
    <!-- Right eye glow -->
    <polygon points="20,11 18,10 16,12 18,13 20,12" fill="#4a7fc1" opacity="0.5"/>
    <!-- Right eye bright -->
    <polygon points="19,11 18,10 17,12 18,13 20,12" fill="#ffffff" opacity="0.9"/>

    <!-- Nose -->
    <polygon points="13,16 14,14 15,16 14,18" fill="#8fa8c0" opacity="0.7"/>

    <!-- Chin plate -->
    <polygon points="10,21 14,19 18,21 16,25 12,25"
             fill="#1a2e44" stroke="#8fa8c0" stroke-width="0.4"/>

    <!-- Center line -->
    <line x1="14" y1="4" x2="14" y2="14" stroke="#8fa8c0" stroke-width="0.3" opacity="0.25"/>
  </g>
</svg>
