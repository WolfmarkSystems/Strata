[package]
name = "strata"
version = "0.3.0"
edition = "2021"
description = "Strata — Every layer. Every artifact. Every platform."
authors = ["Wolfmark Systems LLC"]

[[bin]]
name = "strata"
path = "src/main.rs"

[dependencies]
egui = "0.28"
eframe = { version = "0.28", default-features = false, features = ["default_fonts", "wgpu", "persistence", "x11"] }
egui_extras = { version = "0.28", features = ["image"] }
rusqlite = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4"] }
sha2 = "0.10"
hex = "0.4"
md-5 = "0.10"
rayon = "1.8"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1.0"
libloading = { workspace = true }
rfd = "0.14"
clap = { version = "4", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["jpeg","png","gif","bmp","webp"] }
kamadak-exif = "0.6"
nt-hive = "0.3"
frnsc-prefetch = "0.13.3"
printpdf = "0.9"
tantivy = "0.25"
strata-fs = { workspace = true }
strata-core = { workspace = true }
strata-license = { path = "../../../crates/strata-license" }
strata-plugin-sdk = { path = "../../../crates/strata-plugin-sdk" }
strata-plugin-remnant = { path = "../../../plugins/strata-plugin-remnant" }
strata-plugin-chronicle = { path = "../../../plugins/strata-plugin-chronicle" }
strata-plugin-cipher = { path = "../../../plugins/strata-plugin-cipher" }
strata-plugin-trace = { path = "../../../plugins/strata-plugin-trace" }
strata-plugin-specter = { path = "../../../plugins/strata-plugin-specter" }
strata-plugin-conduit = { path = "../../../plugins/strata-plugin-conduit" }
strata-plugin-nimbus = { path = "../../../plugins/strata-plugin-nimbus" }
strata-plugin-wraith = { path = "../../../plugins/strata-plugin-wraith" }
strata-plugin-vector = { path = "../../../plugins/strata-plugin-vector" }
strata-plugin-recon = { path = "../../../plugins/strata-plugin-recon" }
strata-plugin-sigma = { path = "../../../plugins/strata-plugin-sigma" }
egui-phosphor = "0.11"

[target.'cfg(windows)'.dependencies]
evtx = "0.11.2"

[build-dependencies]
chrono = "0.4"
