[package]
name = "stratashield"
version = "0.1.0"
description = "Strata Shield - Digital Forensics Analysis Tool"
authors = ["Strata Shield Team"]
edition = "2021"

[lib]
name = "forensic_suite_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "stratashield"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
forensic_engine = { package = "strata-shield-engine", path = "../../../../crates/strata-shield-engine", features = [] }
chrono = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sysinfo = "0.33"
rayon = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }

[features]
default = []
parallel = ["forensic_engine/parallel"]

[workspace]

