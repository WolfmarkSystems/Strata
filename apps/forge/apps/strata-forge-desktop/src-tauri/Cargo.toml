[package]
name = "strata-forge-desktop"
version = "0.4.0"
description = "Strata Forge Architecture Terminal"
authors = ["Strata Ecosystem"]
edition = "2021"

[lib]
name = "strata_forge_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.30"
open = "5"
reqwest = { version = "0.12", features = ["json", "stream"] }
futures-util = "0.3"

# WORKSPACE LINKS
strata-core = { workspace = true }
strata-fs = { workspace = true }
