<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DFIR Prompt Editor</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 0; 
      background: #1e1e1e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }
    
    h2 { margin: 0 0 16px 0; font-size: 20px; }
    
    textarea {
      flex: 1;
      background: #252526;
      border: 1px solid #3d3d3d;
      color: #e0e0e0;
      padding: 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      min-height: 350px;
    }
    
    textarea:focus {
      outline: none;
      border-color: #0d47a1;
    }
    
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 12px;
    }
    
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    
    button {
      padding: 12px 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      border: none;
      font-weight: 500;
    }
    
    button.primary {
      background: #0d47a1;
      color: white;
    }
    
    button.secondary {
      background: #3d3d3d;
      color: #e0e0e0;
    }
    
    button:hover { opacity: 0.9; }
    
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    
    .status.success {
      display: block;
      background: #1b4332;
      color: #4ade80;
    }
  </style>
</head>

<body>
  <h2>System Prompt Editor</h2>
  <textarea id="promptEditor" placeholder="Enter system prompt..."></textarea>
  
  <div class="hint">
    This prompt is included with every message sent to the AI in DFIR Coding AI.
    It defines the AI's behavior and expertise.
  </div>
  
  <div class="actions">
    <button class="primary" id="saveBtn">Save Prompt</button>
    <button class="secondary" id="resetBtn">Reset to Default</button>
  </div>
  
  <div class="status" id="status"></div>

<script>
  const DEFAULT_SYS = `You are DFIR Coding AI.

You help me write and review code for DFIR / tool-building, offline-first.
You do NOT perform investigations, interpret evidence, or draw case conclusions.
You focus on safe engineering, hostile-input assumptions, deterministic outputs, and reproducible tooling.
Prefer Rust first. Avoid unsafe unless necessary and explain why.
Ask short clarifying questions only when required.`;

  const STORAGE_KEY = "dfir_sys_prompt";

  const editor = document.getElementById("promptEditor");
  const status = document.getElementById("status");

  function loadPrompt() {
    const saved = localStorage.getItem(STORAGE_KEY);
    editor.value = saved || DEFAULT_SYS;
  }

  function savePrompt() {
    localStorage.setItem(STORAGE_KEY, editor.value);
    showStatus("Prompt saved successfully!");
  }

  function resetPrompt() {
    editor.value = DEFAULT_SYS;
    localStorage.setItem(STORAGE_KEY, DEFAULT_SYS);
    showStatus("Prompt reset to default!");
  }

  function showStatus(msg) {
    status.textContent = msg;
    status.className = "status success";
    setTimeout(() => {
      status.className = "status";
    }, 3000);
  }

  document.getElementById("saveBtn").onclick = savePrompt;
  document.getElementById("resetBtn").onclick = resetPrompt;

  // Load on start
  loadPrompt();
</script>
</body>
</html>
