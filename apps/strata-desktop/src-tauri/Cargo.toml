[workspace]

[package]
name = "strata-desktop"
version = "0.16.0"
description = "Strata — Forensic Intelligence Platform"
authors = ["Wolfmark Systems"]
license = "Proprietary"
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "strata_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.10.3", features = ["protocol-asset", "devtools"] }
tauri-plugin-log = "2"
tauri-plugin-dialog = "2"
tokio = { version = "1", features = ["full"] }
sysinfo = "0.33"

# Day 11 — engine adapter wraps strata-fs/core/plugins behind a clean
# JSON-friendly surface. The adapter lives inside the main strata workspace
# so it can resolve `{ workspace = true }` deps; we reach it via path.
strata-engine-adapter = { path = "../../../crates/strata-engine-adapter" }
augur-plugin-sdk = { path = "../../../../augur/crates/augur-plugin-sdk", optional = true }

# Day 13 — case management
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"

# Day 14 — license validation
ed25519-dalek = "2"
base64 = "0.22"
machine-uid = "0.5"

# v1.2.0 — SQLite viewer feature
rusqlite = { version = "0.30", features = ["bundled"] }

[features]
default = []
augur = ["dep:augur-plugin-sdk", "strata-engine-adapter/augur"]
