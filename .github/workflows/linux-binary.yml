name: Linux Binary Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build strata-desktop (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/strata-desktop/src-tauri -> target
          cache-on-failure: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/strata-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/strata-ui
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Strata (no bundle)
        working-directory: apps/strata-desktop
        run: cargo tauri build --no-bundle

      - name: Report binary size
        run: |
          echo "── Binary size ──────────────────────────────"
          ls -lh apps/strata-desktop/src-tauri/target/release/strata-desktop
          echo
          echo "── File type ────────────────────────────────"
          file apps/strata-desktop/src-tauri/target/release/strata-desktop
          echo
          echo "── Section sizes ────────────────────────────"
          size apps/strata-desktop/src-tauri/target/release/strata-desktop || true
          echo
          echo "── Dynamic library deps ─────────────────────"
          ldd apps/strata-desktop/src-tauri/target/release/strata-desktop || true

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: strata-desktop-linux-x86_64
          path: apps/strata-desktop/src-tauri/target/release/strata-desktop
          if-no-files-found: error
          retention-days: 30
