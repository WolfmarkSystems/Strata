name: Build Strata

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p strata --release
      - uses: actions/upload-artifact@v4
        with:
          name: strata-macos
          path: target/release/strata

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p strata --release
        env:
          CARGO_INCREMENTAL: 0
      - uses: actions/upload-artifact@v4
        with:
          name: strata-windows
          path: target/release/strata.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libx11-dev \
            libxext-dev \
            libxft-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxkbcommon-dev
      - run: cargo build -p strata --release
      - uses: actions/upload-artifact@v4
        with:
          name: strata-linux
          path: target/release/strata
