[package]
name = "wolfmark-license-gen"
version = "0.1.0"
edition = "2024"

[dependencies]
ed25519-dalek = "2"
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
base64 = "0.21"
clap = { version = "4", features = ["derive"] }
strata-license = { path = "../../crates/strata-license" }
